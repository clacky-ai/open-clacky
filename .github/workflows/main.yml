name: Ruby

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    strategy:
      matrix:
        ruby:
          - '4.0'
          - '3.3.5'
          - '2.6'

    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: ${{ matrix.ruby != '2.6' }}
      - name: Bundle install (Ruby 2.6)
        if: matrix.ruby == '2.6'
        run: bundle install --jobs 4
      - name: Run the default task
        run: bundle exec rake

      # Reproduce the exact RubyGems shipped with macOS system Ruby 2.6.3 (RubyGems 2.7.6.2).
      - name: Downgrade RubyGems to mimic macOS system Ruby (Ruby 2.6 only)
        if: matrix.ruby == '2.6'
        run: |
          gem update --system 2.7.6.2 --no-document || gem update --system 2.7.11 --no-document
          gem --version

      # Probe: does this RubyGems correctly fall back to rouge 3.x on Ruby 2.6?
      # Three scenarios:
      #   (a) `gem install rouge` (no version constraint) — known-bad on old RubyGems
      #   (b) `gem install rouge -v ">= 3.14"`             — open upper bound
      #   (c) `gem install rouge -v ">= 3.14, < 5.0"`      — current openclacky.gemspec constraint
      - name: Probe rouge resolution (Ruby 2.6 only)
        if: matrix.ruby == '2.6'
        run: |
          echo "=== (a) no constraint ==="
          gem install rouge --no-document || true
          gem uninstall rouge -aIx || true
          echo "=== (b) >= 3.14 (open upper) ==="
          gem install rouge -v ">= 3.14" --no-document || true
          gem uninstall rouge -aIx || true
          echo "=== (c) >= 3.14, < 5.0 (current gemspec) ==="
          gem install rouge -v ">= 3.14" -v "< 5.0" --no-document || true
          gem list rouge

      # Simulate `gem install openclacky` end-user path (not just bundle install).
      # Note: omit `--local` so transitive deps (chunky_png, rouge, ...) can be fetched from rubygems.org;
      # the openclacky-*.gem file itself is still picked up from the working dir (default --both).
      - name: Smoke-test gem install
        run: |
          gem --version
          gem build openclacky.gemspec
          gem install openclacky-*.gem --no-document
