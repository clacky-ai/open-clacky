name: Ruby

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    strategy:
      matrix:
        ruby:
          - '4.0'
          - '3.3.5'
          - '2.6'

    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: ${{ matrix.ruby != '2.6' }}
      - name: Bundle install (Ruby 2.6)
        if: matrix.ruby == '2.6'
        run: bundle install --jobs 4
      - name: Run the default task
        run: bundle exec rake

      # Mimic the RubyGems shipped with macOS system Ruby 2.6.3 (RubyGems 2.7.x).
      # Without this, GitHub-hosted Ruby 2.6 runners ship RubyGems 3.0.3.1, which has
      # already-fixed resolver behavior and silently masks the regression that real users hit.
      - name: Downgrade RubyGems to mimic macOS system Ruby (Ruby 2.6 only)
        if: matrix.ruby == '2.6'
        run: |
          gem update --system 2.7.6.2 --no-document || gem update --system 2.7.11 --no-document
          gem --version

      # Regression guard: simulate the bare `gem install rouge` path that real Ruby 2.6
      # users hit (e.g. macOS system Ruby). Old RubyGems picks the highest matching version
      # *before* checking required_ruby_version and refuses to fall back, so any constraint
      # that allows rouge 4.x will fail here. The only constraint that survives is `< 4.0`.
      - name: Regression guard — rouge install on Ruby 2.6 (old RubyGems)
        if: matrix.ruby == '2.6'
        run: |
          set -e
          ruby -r rubygems -e '
            spec = Gem::Specification.load("openclacky.gemspec")
            dep  = spec.dependencies.find { |d| d.name == "rouge" } or abort("rouge dep missing")
            puts "openclacky.gemspec rouge constraint: #{dep.requirement}"
            args = dep.requirement.requirements.map { |op, v| ["-v", "#{op} #{v}"] }.flatten
            puts "Running: gem install rouge #{args.join(" ")} --no-document"
            ok = system("gem", "install", "rouge", *args, "--no-document")
            unless ok
              warn ""
              warn "❌ REGRESSION: rouge cannot be installed on Ruby 2.6 with the current"
              warn "   gemspec constraint. End users on macOS system Ruby will see the"
              warn "   exact same error. Tighten the upper bound (e.g. < 4.0)."
              exit 1
            end
          '
          gem list rouge

      # Simulate `gem install openclacky` end-user path (not just bundle install).
      # Note: omit `--local` so transitive deps (chunky_png, rouge, ...) can be fetched from rubygems.org;
      # the openclacky-*.gem file itself is still picked up from the working dir (default --both).
      - name: Smoke-test gem install
        run: |
          gem --version
          gem build openclacky.gemspec
          gem install openclacky-*.gem --no-document
